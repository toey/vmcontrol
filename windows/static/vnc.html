<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM Console - noVNC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1923;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background: #161b22;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #30363d;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .toolbar h1 {
            font-size: 16px;
            color: #58a6ff;
            margin-right: 16px;
        }
        .toolbar label {
            font-size: 13px;
            color: #8b949e;
        }
        .toolbar input, .toolbar select {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
        }
        .toolbar input { width: 80px; }
        .toolbar .info-text {
            color: #58a6ff;
            font-size: 13px;
            font-weight: 600;
        }
        .toolbar button {
            padding: 5px 14px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-connect { background: #238636; color: #fff; }
        .btn-connect:hover { background: #2ea043; }
        .btn-disconnect { background: #da3633; color: #fff; }
        .btn-disconnect:hover { background: #f85149; }
        .btn-fullscreen { background: #30363d; color: #c9d1d9; }
        .btn-fullscreen:hover { background: #484f58; }
        .btn-back {
            background: #30363d; color: #c9d1d9; text-decoration: none;
            padding: 5px 14px; border-radius: 4px; font-size: 13px; font-weight: 600;
        }
        .btn-back:hover { background: #484f58; }
        .btn-reset { background: #d29922; color: #000; }
        .btn-reset:hover { background: #e3b341; }
        .btn-action { background: #1f6feb; color: #fff; }
        .btn-action:hover { background: #388bfd; }
        .btn-unmount { background: #6e7681; color: #fff; }
        .btn-unmount:hover { background: #848d97; }
        .toolbar select { min-width: 120px; }
        #status {
            font-size: 13px; padding: 2px 8px; border-radius: 4px; margin-left: auto;
        }
        .status-connected { background: #238636; color: #fff; }
        .status-disconnected { background: #6e7681; color: #fff; }
        .status-connecting { background: #d29922; color: #000; }
        #vnc-container {
            flex: 1; background: #000; display: flex; align-items: center;
            justify-content: center; overflow: hidden; position: relative;
        }
        #vnc-container canvas { max-width: 100%; max-height: 100%; }
        .placeholder { text-align: center; color: #484f58; }
        .placeholder h2 { font-size: 24px; margin-bottom: 8px; }
        .placeholder p { font-size: 14px; }
        .cd-file { color: #3fb950; font-size: 12px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="toolbar">
        <a href="/" class="btn-back">&larr; Back</a>
        <h1>VM Console</h1>
        <span id="vnc-vm-name" class="info-text" style="font-size:14px;"></span>
        <span id="vnc-host" style="display:none"></span>
        <span id="vnc-port" style="display:none">12001</span>
        <button class="btn-connect" id="btn-connect" onclick="doConnect()">Connect</button>
        <button class="btn-disconnect" id="btn-disconnect" onclick="doDisconnect()" style="display:none">Disconnect</button>
        <button class="btn-fullscreen" onclick="toggleFullscreen()">Fullscreen</button>
        <button class="btn-reset" onclick="doReset()">Reset VM</button>
        <select id="cd-drive-sel" style="min-width:60px;" onchange="window.onDriveSelChange()">
            <option value="cd0">cd0</option><option value="cd1">cd1</option><option value="cd2">cd2</option><option value="cd3">cd3</option>
        </select>
        <span id="cd-drive-action"></span>
        <button onclick="doSendCtrlAltDel()" style="background:#6e40c9;color:#fff;">Ctrl+Alt+Del</button>
        <button id="btn-shift-f10" onclick="doSendShiftF10()" style="background:#8b5cf6;color:#fff;display:none;">Shift+F10</button>
        <button id="btn-alt-shift" onclick="doSendAltShift()" style="background:#f59e0b;color:#000;display:none;">Alt+Shift</button>
        <button id="btn-win11-bypass" onclick="doBypassTPM()" style="background:#ef4444;color:#fff;display:none;">Win11 Bypass</button>
        <button class="btn-action" onclick="doPaste()">Paste</button>
        <button onclick="doSendFiles()" style="background:#059669;color:#fff;padding:5px 14px;border:none;border-radius:4px;font-size:13px;cursor:pointer;font-weight:600;">Send Files</button>
        <span id="status" class="status-disconnected">Disconnected</span>
    </div>

    <!-- Paste modal -->
    <div id="paste-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;justify-content:center;align-items:center;">
        <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-width:600px;width:90%;">
            <h3 style="color:#c9d1d9;margin:0 0 12px 0;">Paste text into VM</h3>
            <textarea id="paste-text" rows="10" style="width:100%;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:10px;font-family:monospace;font-size:13px;resize:vertical;box-sizing:border-box;" placeholder="Paste or type text here... (supports multi-line)"></textarea>
            <div style="display:flex;gap:8px;margin-top:12px;align-items:center;">
                <label id="paste-vim-label" style="color:#8b949e;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;">
                    <input type="checkbox" id="paste-vim-mode"> Vim mode <span style="color:#6e7681;font-size:11px;">(auto :set paste)</span>
                </label>
                <span style="flex:1;"></span>
                <button onclick="closePasteModal()" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;">Cancel</button>
                <button onclick="executePaste()" style="background:#238636;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:bold;">Send</button>
            </div>
        </div>
    </div>

    <!-- Send Files modal -->
    <div id="sendfiles-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;justify-content:center;align-items:center;">
        <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-width:600px;width:90%;">
            <h3 style="color:#c9d1d9;margin:0 0 12px 0;">Send Files to VM</h3>
            <div id="sendfiles-dropzone" style="border:2px dashed #30363d;border-radius:8px;padding:24px;text-align:center;margin-bottom:12px;cursor:pointer;"
                 ondragover="event.preventDefault();this.style.borderColor='#58a6ff';"
                 ondragleave="this.style.borderColor='#30363d';"
                 ondrop="event.preventDefault();this.style.borderColor='#30363d';document.getElementById('sendfiles-input').files=event.dataTransfer.files;updateFileList();"
                 onclick="document.getElementById('sendfiles-input').click();">
                <p style="color:#8b949e;margin:0;">Drag &amp; drop files here, or click to browse</p>
                <input type="file" id="sendfiles-input" multiple style="display:none;" onchange="updateFileList()">
                <div id="sendfiles-filelist" style="color:#c9d1d9;font-size:12px;margin-top:8px;"></div>
            </div>
            <div style="margin-bottom:12px;">
                <label style="color:#c9d1d9;display:block;margin-bottom:6px;font-weight:600;font-size:13px;">Transfer Method:</label>
                <label style="color:#c9d1d9;display:block;cursor:pointer;margin-bottom:4px;font-size:13px;">
                    <input type="radio" name="sendfiles-method" value="iso" id="sendfiles-method-iso" checked onchange="toggleGaOpts()">
                    CD Drive (ISO) &mdash; works on all VMs
                </label>
                <label id="sendfiles-ga-label" style="color:#8b949e;display:block;cursor:pointer;font-size:13px;">
                    <input type="radio" name="sendfiles-method" value="ga" id="sendfiles-method-ga" disabled onchange="toggleGaOpts()">
                    Direct (Guest Agent) &mdash; checking...
                </label>
            </div>
            <div id="sendfiles-ga-opts" style="display:none;margin-bottom:12px;">
                <label style="color:#8b949e;font-size:13px;">Target path in VM:</label>
                <input type="text" id="sendfiles-ga-path" value="/tmp/"
                    style="width:100%;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font-family:monospace;font-size:13px;box-sizing:border-box;margin-top:4px;">
            </div>
            <progress id="sendfiles-progress" value="0" max="100" style="width:100%;height:8px;margin-bottom:8px;appearance:none;-webkit-appearance:none;border:none;background:#21262d;border-radius:4px;"></progress>
            <div id="sendfiles-status" style="color:#8b949e;font-size:12px;min-height:18px;margin-bottom:12px;"></div>
            <div style="display:flex;gap:8px;justify-content:flex-end;">
                <button onclick="closeSendFilesModal()" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;">Cancel</button>
                <button id="sendfiles-send-btn" onclick="executeSendFiles()" style="background:#238636;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:bold;">Send</button>
            </div>
        </div>
    </div>

    <div id="vnc-container">
        <div class="placeholder" id="placeholder">
            <h2>noVNC Console</h2>
            <p>Click Connect to open the VNC console</p>
        </div>
    </div>

    <script type="module">
        // Load noVNC from local vendor files (not CDN) for reliable keyboard support
        import RFB from '/vendor/novnc/core/rfb.js';

        let rfb = null;
        window._rfb = null;  // expose for debugging/paste
        window._vncSmac = null;  // resolved VM name (from token or smac param)

        // API key helper — read from localStorage (shared with main app)
        function getApiKey() {
            return localStorage.getItem('vmcontrol_api_key') || '';
        }
        function authHeaders(extra) {
            var h = extra || {};
            var key = getApiKey();
            if (key) h['X-API-Key'] = key;
            return h;
        }
        async function apiFetch(url, opts) {
            opts = opts || {};
            opts.headers = authHeaders(opts.headers || {});
            return fetch(url, opts);
        }

        function setStatus(text, cls) {
            var el = document.getElementById('status');
            el.textContent = text;
            el.className = cls;
        }

        window.doConnect = function() {
            if (rfb) { rfb.disconnect(); rfb = null; }

            var host = document.getElementById('vnc-host').textContent;
            var port = document.getElementById('vnc-port').textContent;
            var url = 'ws://' + host + ':' + port;

            document.getElementById('placeholder').style.display = 'none';
            setStatus('Connecting...', 'status-connecting');

            try {
                rfb = new RFB(document.getElementById('vnc-container'), url);
                window._rfb = rfb;
                rfb.scaleViewport = true;
                rfb.resizeSession = false;
                rfb.focusOnClick = true;

                rfb.addEventListener('connect', function() {
                    setStatus('Connected', 'status-connected');
                    document.getElementById('btn-connect').style.display = 'none';
                    document.getElementById('btn-disconnect').style.display = '';
                    rfb.focus();
                });

                rfb.addEventListener('disconnect', function(e) {
                    if (e.detail.clean) {
                        setStatus('Disconnected', 'status-disconnected');
                    } else {
                        setStatus('Connection lost', 'status-disconnected');
                    }
                    document.getElementById('btn-connect').style.display = '';
                    document.getElementById('btn-disconnect').style.display = 'none';
                    rfb = null;
                    window._rfb = null;
                });
            } catch (err) {
                setStatus('Error: ' + err.message, 'status-disconnected');
            }
        };

        window.doDisconnect = function() {
            if (rfb) { rfb.disconnect(); rfb = null; }
        };

        window.doSendCtrlAltDel = function() {
            if (!rfb) { alert('Not connected'); return; }
            rfb.sendCtrlAltDel();
            setStatus('Sent Ctrl+Alt+Del', 'status-connected');
        };

        window.doSendShiftF10 = function() {
            if (!rfb) { alert('Not connected'); return; }
            // Shift down → F10 down → F10 up → Shift up
            rfb.sendKey(0xffe1, 'ShiftLeft', true);
            rfb.sendKey(0xffc7, 'F10', true);
            rfb.sendKey(0xffc7, 'F10', false);
            rfb.sendKey(0xffe1, 'ShiftLeft', false);
            setStatus('Sent Shift+F10', 'status-connected');
        };

        window.doSendAltShift = function() {
            if (!rfb) { alert('Not connected'); return; }
            // Alt+Shift to switch input language in Windows
            rfb.sendKey(0xffe9, 'AltLeft', true);
            rfb.sendKey(0xffe1, 'ShiftLeft', true);
            rfb.sendKey(0xffe1, 'ShiftLeft', false);
            rfb.sendKey(0xffe9, 'AltLeft', false);
            setStatus('Sent Alt+Shift (switch language)', 'status-connected');
        };

        window.doBypassTPM = function() {
            if (!rfb) { alert('Not connected'); return; }
            if (!confirm('This will type reg commands to bypass TPM, Secure Boot & Network check.\nMake sure CMD prompt is open (use Shift+F10 first).\n\nProceed?')) return;
            var cmds = [
                'reg add HKLM\\SYSTEM\\Setup\\LabConfig /v BypassTPMCheck /t REG_DWORD /d 1 /f',
                'reg add HKLM\\SYSTEM\\Setup\\LabConfig /v BypassSecureBootCheck /t REG_DWORD /d 1 /f',
                'reg add HKLM\\SYSTEM\\Setup\\LabConfig /v BypassNRO /t REG_DWORD /d 1 /f',
            ].join('\n') + '\n';
            sendTextToVm(cmds);
        };

        // Key maps for paste (US keyboard layout)
        var SHIFT_MAP = {
            '~': 'Backquote', '!': 'Digit1', '@': 'Digit2', '#': 'Digit3',
            '$': 'Digit4', '%': 'Digit5', '^': 'Digit6', '&': 'Digit7',
            '*': 'Digit8', '(': 'Digit9', ')': 'Digit0', '_': 'Minus',
            '+': 'Equal', '{': 'BracketLeft', '}': 'BracketRight',
            '|': 'Backslash', ':': 'Semicolon', '"': 'Quote',
            '<': 'Comma', '>': 'Period', '?': 'Slash',
        };
        var CODE_MAP = {
            '`': 'Backquote', '-': 'Minus', '=': 'Equal',
            '[': 'BracketLeft', ']': 'BracketRight', '\\': 'Backslash',
            ';': 'Semicolon', "'": 'Quote', ',': 'Comma',
            '.': 'Period', '/': 'Slash', ' ': 'Space',
            '0': 'Digit0', '1': 'Digit1', '2': 'Digit2', '3': 'Digit3',
            '4': 'Digit4', '5': 'Digit5', '6': 'Digit6', '7': 'Digit7',
            '8': 'Digit8', '9': 'Digit9',
        };

        var _pasteInProgress = false;

        // Convert a character into an array of individual key events
        // Each event: { ks, code, down? }
        // Shifted chars produce 4 events (shift-down, key-down, key-up, shift-up)
        // so each sub-event gets its own delay for QEMU TCG to keep up.
        function charToKeyEvents(ch, keysym) {
            if (ch === '\r') return [];
            if (ch === '\n') {
                return [{ ks: 0xff0d, code: 'Enter' }];
            }
            if (ch === '\t') {
                return [{ ks: 0xff09, code: 'Tab' }];
            }
            if (SHIFT_MAP[ch]) {
                return [
                    { ks: 0xffe1, code: 'ShiftLeft', down: true },
                    { ks: keysym, code: SHIFT_MAP[ch], down: true },
                    { ks: keysym, code: SHIFT_MAP[ch], down: false },
                    { ks: 0xffe1, code: 'ShiftLeft', down: false },
                ];
            }
            if (ch >= 'A' && ch <= 'Z') {
                return [
                    { ks: 0xffe1, code: 'ShiftLeft', down: true },
                    { ks: keysym, code: 'Key' + ch, down: true },
                    { ks: keysym, code: 'Key' + ch, down: false },
                    { ks: 0xffe1, code: 'ShiftLeft', down: false },
                ];
            }
            if (ch >= 'a' && ch <= 'z') {
                return [{ ks: keysym, code: 'Key' + ch.toUpperCase() }];
            }
            return [{ ks: keysym, code: CODE_MAP[ch] || null }];
        }

        // Send text by scheduling individual key events with 12ms delay each.
        // Shifted chars (like # " : A-Z) produce 4 events = 48ms total,
        // giving QEMU TCG enough time to process shift+key properly.
        function sendTextToVm(text, callback) {
            // Build flat list of all key events
            var events = [];
            var charIndices = []; // parallel array: which char index each event belongs to
            var charCount = 0;
            for (var c = 0; c < text.length; c++) {
                var ch = text[c];
                var keysym = text.charCodeAt(c);
                var kevs = charToKeyEvents(ch, keysym);
                for (var j = 0; j < kevs.length; j++) {
                    events.push(kevs[j]);
                    charIndices.push(charCount);
                }
                if (kevs.length > 0) charCount++;
            }

            var total = charCount;
            var ei = 0; // event index
            var totalEvents = events.length;
            _pasteInProgress = true;

            function next() {
                if (ei < totalEvents) {
                    var ev = events[ei];
                    if (ev.down !== undefined) {
                        rfb.sendKey(ev.ks, ev.code, ev.down);
                    } else {
                        rfb.sendKey(ev.ks, ev.code);
                    }
                    var charsDone = charIndices[ei] + 1;
                    ei++;
                    // Update status every 20 chars
                    if (ei >= totalEvents || charsDone % 20 === 0) {
                        setStatus('Pasting... ' + charsDone + '/' + total, 'status-connected');
                    }
                }
                if (ei < totalEvents) {
                    setTimeout(next, 25);
                } else {
                    _pasteInProgress = false;
                    setStatus('Typed ' + total + ' chars', 'status-connected');
                    if (callback) callback();
                }
            }
            next();
        }

        window.doPaste = function() {
            if (!rfb) { alert('Not connected'); return; }
            if (_pasteInProgress) { alert('Paste already in progress'); return; }
            var modal = document.getElementById('paste-modal');
            var textarea = document.getElementById('paste-text');
            textarea.value = '';
            modal.style.display = 'flex';
            textarea.focus();
        };

        window.closePasteModal = function() {
            document.getElementById('paste-modal').style.display = 'none';
        };

        // Send a vim command sequence: Esc, then type the command, then Enter
        function sendVimCommand(cmd, callback) {
            // Esc key
            rfb.sendKey(0xff1b, 'Escape');
            var fullCmd = cmd + '\n';
            var delay = 80; // wait for Esc to take effect
            setTimeout(function() {
                sendTextToVm(fullCmd, callback);
            }, delay);
        }

        window.executePaste = function() {
            var text = document.getElementById('paste-text').value;
            var vimMode = document.getElementById('paste-vim-mode').checked;
            document.getElementById('paste-modal').style.display = 'none';
            if (!text || !rfb) return;

            if (vimMode) {
                // Vim mode: Esc → :set paste → Enter → i → <text> → Esc → :set nopaste → Enter
                setStatus('Vim: setting paste mode...', 'status-connecting');
                sendVimCommand(':set paste', function() {
                    // Enter insert mode
                    setTimeout(function() {
                        rfb.sendKey(0x69, 'KeyI'); // 'i' to enter insert mode
                        setTimeout(function() {
                            sendTextToVm(text, function() {
                                // After paste: Esc → :set nopaste
                                setTimeout(function() {
                                    sendVimCommand(':set nopaste', function() {
                                        setStatus('Vim paste complete', 'status-connected');
                                    });
                                }, 100);
                            });
                        }, 100);
                    }, 100);
                });
            } else {
                sendTextToVm(text);
            }
        };

        // Allow Ctrl+Enter to send from textarea
        document.getElementById('paste-text').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                window.executePaste();
            } else if (e.key === 'Escape') {
                window.closePasteModal();
            }
        });

        // ===== Send Files functions =====
        window._isWindows = false;
        window._vmArch = 'x86_64';

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
            return (bytes / 1073741824).toFixed(1) + ' GB';
        }

        window.updateFileList = function() {
            var files = document.getElementById('sendfiles-input').files;
            var html = '';
            var totalSize = 0;
            for (var i = 0; i < files.length; i++) {
                html += files[i].name + ' (' + formatBytes(files[i].size) + ')<br>';
                totalSize += files[i].size;
            }
            if (files.length > 1) {
                html += '<strong>Total: ' + formatBytes(totalSize) + '</strong>';
            }
            document.getElementById('sendfiles-filelist').innerHTML = html;
        };

        window.toggleGaOpts = function() {
            var isGa = document.getElementById('sendfiles-method-ga').checked;
            document.getElementById('sendfiles-ga-opts').style.display = isGa ? '' : 'none';
        };

        window.doSendFiles = async function() {
            if (!window._vncSmac) { alert('No VM connected'); return; }
            // Reset modal
            document.getElementById('sendfiles-input').value = '';
            document.getElementById('sendfiles-filelist').innerHTML = '';
            document.getElementById('sendfiles-progress').value = 0;
            document.getElementById('sendfiles-status').textContent = '';
            document.getElementById('sendfiles-method-iso').checked = true;
            document.getElementById('sendfiles-ga-opts').style.display = 'none';
            document.getElementById('sendfiles-send-btn').disabled = false;
            document.getElementById('sendfiles-ga-path').value = window._isWindows ? 'C:\\Users\\Public\\' : '/tmp/';
            document.getElementById('sendfiles-modal').style.display = 'flex';

            // Check guest agent availability — update text span only, preserve radio element
            var gaRadio = document.getElementById('sendfiles-method-ga');
            var gaLabel = document.getElementById('sendfiles-ga-label');
            var gaHintSpan = document.getElementById('sendfiles-ga-hint');
            if (!gaHintSpan) {
                // Create hint span once — appended after the radio input text
                gaHintSpan = document.createElement('span');
                gaHintSpan.id = 'sendfiles-ga-hint';
                gaLabel.appendChild(gaHintSpan);
            }

            function getGaHint(available, failed) {
                if (available) return ' Direct (Guest Agent) \u2014 <span style="color:#3fb950">available</span>';
                var prefix = failed ? 'check failed' : 'not available';
                if (window._isWindows && window._vmArch === 'aarch64') {
                    return ' Direct (Guest Agent) \u2014 ' + prefix + ': guest agent not included in virtio-win for ARM64';
                } else if (window._isWindows) {
                    return ' Direct (Guest Agent) \u2014 ' + prefix + ': run <b>D:\\virtio-win-guest-tools.exe</b> or <b>D:\\guest-agent\\qemu-ga-x86_64.msi</b> in VM';
                }
                return ' Direct (Guest Agent) \u2014 ' + prefix + ': run <b>apt install qemu-guest-agent</b> in VM';
            }

            try {
                var res = await apiFetch('/api/vm/guest-agent/' + encodeURIComponent(window._vncSmac));
                if (!res.ok) throw new Error('HTTP ' + res.status);
                var data = await res.json();
                if (data.available) {
                    gaRadio.disabled = false;
                    gaLabel.style.color = '#3fb950';
                    gaHintSpan.innerHTML = getGaHint(true, false);
                } else {
                    gaRadio.disabled = true;
                    gaRadio.checked = false;
                    gaLabel.style.color = '#6e7681';
                    gaHintSpan.innerHTML = getGaHint(false, false);
                }
            } catch (e) {
                gaRadio.disabled = true;
                gaRadio.checked = false;
                gaLabel.style.color = '#6e7681';
                gaHintSpan.innerHTML = getGaHint(false, true);
            }
        };

        window.closeSendFilesModal = function() {
            document.getElementById('sendfiles-modal').style.display = 'none';
        };

        window.executeSendFiles = function() {
            var method = document.querySelector('input[name="sendfiles-method"]:checked');
            if (!method) return;
            if (method.value === 'ga') {
                executeSendFilesGA();
            } else {
                executeSendFilesISO();
            }
        };

        function cleanupPreviousISO(callback) {
            var prev = window._sendfilesIso;
            if (!prev || !prev.drive) { callback(); return; }
            var smac = window._vncSmac;
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/vm/sendfiles-cleanup/' + encodeURIComponent(smac));
            var key = getApiKey();
            if (key) xhr.setRequestHeader('X-API-Key', key);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                window._sendfilesIso = null;
                if (xhr.status >= 400) {
                    console.warn('Cleanup returned HTTP ' + xhr.status + ': ' + xhr.responseText);
                }
                callback();
            };
            xhr.onerror = function() {
                window._sendfilesIso = null;
                console.warn('Cleanup network error');
                callback();
            };
            xhr.send(JSON.stringify({ drive: prev.drive, iso_name: prev.iso_name }));
        }

        function executeSendFilesISO() {
            var files = document.getElementById('sendfiles-input').files;
            if (!files || !files.length) { alert('Select at least one file'); return; }

            document.getElementById('sendfiles-send-btn').disabled = true;
            document.getElementById('sendfiles-status').textContent = 'Cleaning up previous ISO...';

            // Cleanup previous ISO from frontend side, then upload new
            cleanupPreviousISO(function() {
                doSendFilesUpload(files);
            });
        }

        function doSendFilesUpload(files) {
            var formData = new FormData();
            for (var i = 0; i < files.length; i++) {
                formData.append('files', files[i], files[i].name);
            }

            var smac = window._vncSmac;
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/vm/sendfiles/' + encodeURIComponent(smac));
            var key = getApiKey();
            if (key) xhr.setRequestHeader('X-API-Key', key);

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    var pct = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('sendfiles-progress').value = pct;
                    document.getElementById('sendfiles-status').textContent =
                        'Uploading... ' + pct + '% (' + formatBytes(e.loaded) + ' / ' + formatBytes(e.total) + ')';
                }
            };

            xhr.onload = function() {
                document.getElementById('sendfiles-send-btn').disabled = false;
                if (xhr.status >= 400) {
                    var errMsg = 'HTTP ' + xhr.status;
                    try { errMsg = JSON.parse(xhr.responseText).message || errMsg; } catch(e) {}
                    document.getElementById('sendfiles-status').innerHTML =
                        '<span style="color:#f85149;">Error: ' + errMsg + '</span>';
                    return;
                }
                try {
                    var data = JSON.parse(xhr.responseText);
                    if (data.success) {
                        document.getElementById('sendfiles-progress').value = 100;
                        document.getElementById('sendfiles-status').innerHTML =
                            '<span style="color:#3fb950;">' + data.message + '</span>';
                        window._sendfilesIso = { drive: data.drive, iso_name: data.iso_name };
                        loadBlockInfo();
                    } else {
                        document.getElementById('sendfiles-status').innerHTML =
                            '<span style="color:#f85149;">Error: ' + data.message + '</span>';
                    }
                } catch (e) {
                    document.getElementById('sendfiles-status').innerHTML =
                        '<span style="color:#f85149;">Error: ' + xhr.responseText + '</span>';
                }
            };

            xhr.onerror = function() {
                document.getElementById('sendfiles-send-btn').disabled = false;
                document.getElementById('sendfiles-status').innerHTML =
                    '<span style="color:#f85149;">Network error</span>';
            };

            document.getElementById('sendfiles-status').textContent = 'Uploading...';
            xhr.send(formData);
        }

        async function executeSendFilesGA() {
            var files = document.getElementById('sendfiles-input').files;
            if (!files || !files.length) { alert('Select at least one file'); return; }

            var targetPath = document.getElementById('sendfiles-ga-path').value || '/tmp/';
            var smac = window._vncSmac;
            document.getElementById('sendfiles-send-btn').disabled = true;

            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                document.getElementById('sendfiles-status').textContent =
                    'Sending file ' + (i + 1) + '/' + files.length + ': ' + file.name + '...';

                try {
                    await new Promise(function(resolve, reject) {
                        var xhr = new XMLHttpRequest();
                        xhr.open('POST', '/api/vm/guestfile/' + encodeURIComponent(smac));
                        var key = getApiKey();
                        if (key) xhr.setRequestHeader('X-API-Key', key);
                        xhr.setRequestHeader('X-Guest-Path', targetPath);
                        xhr.setRequestHeader('X-Filename', file.name);

                        xhr.upload.onprogress = function(e) {
                            if (e.lengthComputable) {
                                var pct = Math.round((e.loaded / e.total) * 100);
                                document.getElementById('sendfiles-progress').value = pct;
                            }
                        };

                        xhr.onload = function() {
                            if (xhr.status >= 400) {
                                var msg = 'HTTP ' + xhr.status;
                                try { msg = JSON.parse(xhr.responseText).message || msg; } catch(e) {}
                                reject(new Error(msg));
                                return;
                            }
                            try {
                                var data = JSON.parse(xhr.responseText);
                                if (data.success) resolve();
                                else reject(new Error(data.message));
                            } catch (e) { reject(new Error(xhr.responseText)); }
                        };
                        xhr.onerror = function() { reject(new Error('Network error')); };
                        xhr.send(file);
                    });
                } catch (err) {
                    document.getElementById('sendfiles-send-btn').disabled = false;
                    document.getElementById('sendfiles-status').innerHTML =
                        '<span style="color:#f85149;">Error on ' + file.name + ': ' + err.message + '</span>';
                    return;
                }
            }

            document.getElementById('sendfiles-send-btn').disabled = false;
            document.getElementById('sendfiles-progress').value = 100;
            document.getElementById('sendfiles-status').innerHTML =
                '<span style="color:#3fb950;">All ' + files.length + ' file(s) sent successfully!</span>';
        }

        // Allow Escape to close sendfiles modal
        document.getElementById('sendfiles-modal').addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeSendFilesModal();
        });

        window.toggleFullscreen = function() {
            var el = document.getElementById('vnc-container');
            if (!document.fullscreenElement) {
                el.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };

        window.doReset = async function() {
            var smac = window._vncSmac;
            if (!smac) {
                smac = prompt('Enter VM-NAME:');
                if (!smac) return;
            }
            if (!confirm('Reset VM "' + smac + '"?')) return;
            setStatus('Resetting...', 'status-connecting');
            try {
                var res = await apiFetch('/api/vm/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ smac: smac }),
                });
                var data = await res.json();
                if (data.success) {
                    setStatus('Reset OK', 'status-connected');
                } else {
                    setStatus('Reset failed: ' + data.message, 'status-disconnected');
                }
            } catch (e) {
                setStatus('Reset error: ' + e.message, 'status-disconnected');
            }
        };

        // ISO list cache
        window._isoList = [];

        window.loadIsoList = async function() {
            try {
                var res = await apiFetch('/api/iso/list');
                window._isoList = await res.json();
            } catch (e) { window._isoList = []; }
        };

        // Build ISO <option> HTML for dropdowns
        function isoOptionsHtml() {
            var html = '<option value="">-- ISO --</option>';
            window._isoList.forEach(function(iso) {
                html += '<option value="' + iso.name + '">' + iso.name + '</option>';
            });
            return html;
        }

        // Store block info globally for drive selector
        window._blockInfo = null;

        // Update the action area for the currently selected drive
        window.onDriveSelChange = function() {
            var drive = document.getElementById('cd-drive-sel').value;
            var actionSpan = document.getElementById('cd-drive-action');
            var info = (window._blockInfo && window._blockInfo[drive]) || { mounted: false, file: '' };
            if (info.mounted) {
                actionSpan.innerHTML = '<span class="cd-file" title="' + info.file + '">' + info.file + '</span> ' +
                    '<button class="btn-unmount" onclick="doUnmountDrive(\'' + drive + '\')" style="font-size:11px;padding:2px 8px;">Unmount</button>';
            } else {
                actionSpan.innerHTML = '<select id="iso-sel-active" style="min-width:120px;font-size:12px;padding:2px 4px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:3px;">' + isoOptionsHtml() + '</select> ' +
                    '<button class="btn-action" onclick="doMountDrive(\'' + drive + '\')" style="font-size:11px;padding:2px 8px;">Mount</button>';
            }
        };

        // Render drives — save block info and refresh current drive view
        window.renderCdDrives = function(blockInfo) {
            window._blockInfo = blockInfo;
            window.onDriveSelChange();
        };

        // Load block info from QEMU and render
        window.loadBlockInfo = async function() {
            var smac = window._vncSmac;
            if (!smac) { renderCdDrives(null); return; }
            try {
                var res = await apiFetch('/api/vm/blockinfo/' + encodeURIComponent(smac));
                if (res.ok) {
                    var data = await res.json();
                    renderCdDrives(data);
                } else {
                    renderCdDrives(null);
                }
            } catch (e) {
                renderCdDrives(null);
            }
        };

        // Mount ISO on a specific drive
        window.doMountDrive = async function(drive) {
            var smac = window._vncSmac;
            if (!smac) { alert('No VM-NAME'); return; }
            var sel = document.getElementById('iso-sel-active');
            var iso = sel ? sel.value : '';
            if (!iso) { alert('Select an ISO for ' + drive); return; }
            setStatus('Mounting ' + iso + ' on ' + drive + '...', 'status-connecting');
            try {
                var res = await apiFetch('/api/vm/mountiso', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ smac: smac, isoname: iso, drive: drive }),
                });
                var data = await res.json();
                if (data.success) {
                    setStatus('Mounted: ' + iso + ' on ' + drive, 'status-connected');
                    loadBlockInfo();
                } else {
                    setStatus('Mount failed: ' + data.message, 'status-disconnected');
                }
            } catch (e) {
                setStatus('Mount error: ' + e.message, 'status-disconnected');
            }
        };

        // Unmount a specific drive
        window.doUnmountDrive = async function(drive) {
            var smac = window._vncSmac;
            if (!smac) { alert('No VM-NAME'); return; }
            setStatus('Unmounting ' + drive + '...', 'status-connecting');
            try {
                var res = await apiFetch('/api/vm/unmountiso', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ smac: smac, drive: drive }),
                });
                var data = await res.json();
                if (data.success) {
                    setStatus(drive + ' unmounted', 'status-connected');
                    loadBlockInfo();
                } else {
                    setStatus('Unmount failed: ' + data.message, 'status-disconnected');
                }
            } catch (e) {
                setStatus('Unmount error: ' + e.message, 'status-disconnected');
            }
        };

        // Re-focus VNC after toolbar button clicks
        document.querySelector('.toolbar').addEventListener('click', function(e) {
            if (!rfb) return;
            if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
            setTimeout(function() { if (rfb) rfb.focus(); }, 150);
        });

        // Show/hide Windows-specific toolbar buttons + hide vim mode for Windows
        function showWindowsButtons(show) {
            var ids = ['btn-shift-f10', 'btn-alt-shift', 'btn-win11-bypass'];
            ids.forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.style.display = show ? '' : 'none';
            });
            // Hide vim mode checkbox for Windows VMs
            var vimLabel = document.getElementById('paste-vim-label');
            if (vimLabel) vimLabel.style.display = show ? 'none' : '';
        }

        // Helper: set up VNC page after resolving VM info
        function setupVm(smac, vncPort, vmStatus) {
            window._vncSmac = smac;
            document.getElementById('vnc-vm-name').textContent = smac;
            document.title = smac + ' — VM Console';
            if (vncPort) {
                document.getElementById('vnc-port').textContent = vncPort;
            }
            if (vmStatus === 'running' && vncPort) {
                setTimeout(doConnect, 300);
                // Load block info to show per-drive mount state
                loadBlockInfo();
            } else if (!vncPort) {
                setStatus('No VNC port for ' + smac, 'status-disconnected');
            } else {
                setStatus('VM is stopped', 'status-disconnected');
            }
        }

        // Load ISO list on page load, then render initial drive view
        loadIsoList().then(function() { onDriveSelChange(); });

        // Set VNC host to current page hostname
        document.getElementById('vnc-host').textContent = window.location.hostname || 'localhost';

        // Parse URL params
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');
        var smac = params.get('smac');

        if (params.get('host')) {
            document.getElementById('vnc-host').textContent = params.get('host');
        }

        if (token) {
            // --- Token flow: resolve one-time token (no API key needed) ---
            (async function() {
                try {
                    setStatus('Resolving token...', 'status-connecting');
                    var res = await fetch('/api/vnc/resolve/' + encodeURIComponent(token));
                    if (!res.ok) {
                        var err = await res.json().catch(function() { return {}; });
                        setStatus('Token invalid or expired: ' + (err.message || res.status), 'status-disconnected');
                        return;
                    }
                    var data = await res.json();
                    // data = { smac, vnc_port, status, is_windows, arch }
                    window._isWindows = !!data.is_windows;
                    window._vmArch = data.arch || 'x86_64';
                    if (data.is_windows) showWindowsButtons(true);
                    setupVm(data.smac, data.vnc_port, data.status);
                } catch(e) {
                    setStatus('Token error: ' + e.message, 'status-disconnected');
                }
            })();
        } else if (smac) {
            // --- Legacy smac flow: fetch VM info with API key ---
            (async function() {
                try {
                    setStatus('Loading VM info...', 'status-connecting');
                    var res = await apiFetch('/api/vm/get/' + encodeURIComponent(smac));
                    if (!res.ok) {
                        setStatus('VM not found: ' + smac, 'status-disconnected');
                        return;
                    }
                    var vm = await res.json();
                    var port = 0;
                    var isWin = false;
                    var vmArch = 'x86_64';
                    if (vm.config) {
                        try {
                            var cfg = JSON.parse(vm.config);
                            port = cfg.vnc_port || 0;
                            isWin = cfg.features && cfg.features.is_windows === '1';
                            vmArch = cfg.arch || 'x86_64';
                        } catch(e) {}
                    }
                    window._isWindows = isWin;
                    window._vmArch = vmArch;
                    if (isWin) showWindowsButtons(true);
                    setupVm(smac, port, vm.status);
                } catch(e) {
                    setStatus('Error: ' + e.message, 'status-disconnected');
                }
            })();
        } else if (params.get('port')) {
            // Legacy fallback: ?port=12001
            document.getElementById('vnc-port').textContent = params.get('port');
            setTimeout(doConnect, 500);
        }
    </script>
</body>
</html>
